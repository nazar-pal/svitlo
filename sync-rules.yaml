config:
  edition: 3

streams:
  # ── 1. Current user's own record ───────────────────────────────────────────
  user_data:
    auto_subscribe: true
    query: >
      SELECT id, name, email, email_verified, image, created_at, updated_at
      FROM "user"
      WHERE id = auth.user_id()

  # ── 2. Peer users in shared organizations (for display names / avatars) ────
  # Three queries: members of admin orgs, members of member orgs, admins of member orgs.
  # Current user may appear but is deduplicated by PowerSync (same row ID).
  peer_users:
    auto_subscribe: true
    queries:
      - >
        SELECT u.id, u.name, u.email, u.email_verified, u.image,
               u.created_at, u.updated_at
        FROM "user" u
        INNER JOIN organization_members om ON om.user_id = u.id
        WHERE om.organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT u.id, u.name, u.email, u.email_verified, u.image,
               u.created_at, u.updated_at
        FROM "user" u
        INNER JOIN organization_members om ON om.user_id = u.id
        WHERE om.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = auth.user_id()
        )
      - >
        SELECT u.id, u.name, u.email, u.email_verified, u.image,
               u.created_at, u.updated_at
        FROM "user" u
        INNER JOIN organizations o ON o.admin_user_id = u.id
        WHERE o.id IN (
          SELECT organization_id FROM organization_members WHERE user_id = auth.user_id()
        )

  # ── 3. Organizations the user belongs to (as admin or member) ──────────────
  org_data:
    auto_subscribe: true
    queries:
      - >
        SELECT id, name, admin_user_id, created_at
        FROM organizations
        WHERE admin_user_id = auth.user_id()
      - >
        SELECT id, name, admin_user_id, created_at
        FROM organizations
        WHERE id IN (
          SELECT organization_id FROM organization_members WHERE user_id = auth.user_id()
        )

  # ── 4. Organization members for the user's organizations ───────────────────
  org_members_data:
    auto_subscribe: true
    queries:
      - >
        SELECT id, organization_id, user_id, joined_at
        FROM organization_members
        WHERE organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, organization_id, user_id, joined_at
        FROM organization_members
        WHERE organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = auth.user_id()
        )

  # ── 5. Invitations — admin's orgs + invitations addressed to user's email ──
  invitation_data:
    auto_subscribe: true
    queries:
      - >
        SELECT id, organization_id, invitee_email, created_at
        FROM invitations
        WHERE organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT i.id, i.organization_id, i.invitee_email, i.created_at
        FROM invitations i
        INNER JOIN "user" u ON u.email = i.invitee_email
        WHERE u.id = auth.user_id()

  # ── 6. Generators — all in admin orgs, only assigned in member orgs ────────
  generator_data:
    auto_subscribe: true
    queries:
      - >
        SELECT id, organization_id, name, generator_type, description,
               max_consecutive_run_hours, required_rest_hours,
               run_warning_threshold_pct, created_at
        FROM generators
        WHERE organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, organization_id, name, generator_type, description,
               max_consecutive_run_hours, required_rest_hours,
               run_warning_threshold_pct, created_at
        FROM generators
        WHERE id IN (
          SELECT generator_id FROM generator_user_assignments WHERE user_id = auth.user_id()
        )

  # ── 7. Generator user assignments for visible generators ───────────────────
  assignment_data:
    auto_subscribe: true
    queries:
      - >
        SELECT gua.id, gua.generator_id, gua.user_id, gua.assigned_at
        FROM generator_user_assignments gua
        INNER JOIN generators g ON g.id = gua.generator_id
        WHERE g.organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, generator_id, user_id, assigned_at
        FROM generator_user_assignments
        WHERE user_id = auth.user_id()

  # ── 8. Generator sessions for visible generators ───────────────────────────
  session_data:
    auto_subscribe: true
    queries:
      - >
        SELECT gs.id, gs.generator_id, gs.started_by_user_id, gs.stopped_by_user_id,
               gs.started_at, gs.stopped_at
        FROM generator_sessions gs
        INNER JOIN generators g ON g.id = gs.generator_id
        WHERE g.organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, generator_id, started_by_user_id, stopped_by_user_id,
               started_at, stopped_at
        FROM generator_sessions
        WHERE generator_id IN (
          SELECT generator_id FROM generator_user_assignments WHERE user_id = auth.user_id()
        )

  # ── 9. Maintenance templates for visible generators ────────────────────────
  template_data:
    auto_subscribe: true
    queries:
      - >
        SELECT mt.id, mt.generator_id, mt.task_name, mt.description,
               mt.trigger_type, mt.trigger_hours_interval, mt.trigger_calendar_days,
               mt.created_at
        FROM maintenance_templates mt
        INNER JOIN generators g ON g.id = mt.generator_id
        WHERE g.organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, generator_id, task_name, description,
               trigger_type, trigger_hours_interval, trigger_calendar_days,
               created_at
        FROM maintenance_templates
        WHERE generator_id IN (
          SELECT generator_id FROM generator_user_assignments WHERE user_id = auth.user_id()
        )

  # ── 10. Maintenance records for visible generators ─────────────────────────
  record_data:
    auto_subscribe: true
    queries:
      - >
        SELECT mr.id, mr.template_id, mr.generator_id, mr.performed_by_user_id,
               mr.performed_at, mr.notes
        FROM maintenance_records mr
        INNER JOIN generators g ON g.id = mr.generator_id
        WHERE g.organization_id IN (
          SELECT id FROM organizations WHERE admin_user_id = auth.user_id()
        )
      - >
        SELECT id, template_id, generator_id, performed_by_user_id,
               performed_at, notes
        FROM maintenance_records
        WHERE generator_id IN (
          SELECT generator_id FROM generator_user_assignments WHERE user_id = auth.user_id()
        )
